<<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>
        Face Verification
    </title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body class="dashboard-body">

<div class="main-content text-center">

    <h1 class="mb-5">
        AI Face Verification
    </h1>

    <div class="camera-box">

        <video id="video"
               autoplay
               playsinline>
        </video>

        <div class="scanner-line"></div>

    </div>

    <button onclick="startCamera()"
            class="btn btn-success btn-lg mt-4 glow-btn">

        Start AI Verification

    </button>

    <h2 id="scan-result"
        class="mt-5">
    </h2>

</div>

<script>

async function startCamera() {

    const video =
            document.getElementById(
                "video"
            );

    try {

        const stream =
                await navigator
                .mediaDevices
                .getUserMedia({

                    video: true

                });

        video.srcObject =
                stream;

        document.getElementById(
            "scan-result"
        ).innerHTML =

        "🔍 Scanning Face...";

        setTimeout(() => {

            document.getElementById(
                "scan-result"
            ).innerHTML =

            "✅ Identity Verified";

        }, 4000);

    } catch(error) {

        document.getElementById(
            "scan-result"
        ).innerHTML =

        "❌ Camera Access Denied";
    }
}

</script>

</body>

</html>
