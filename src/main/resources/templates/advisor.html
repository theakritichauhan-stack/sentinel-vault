<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>AI Financial Advisor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            padding:40px;
            font-family:Arial,sans-serif;
        }

        .advisor-card{
            background:#1e293b;
            border-radius:15px;
            padding:25px;
            margin-bottom:20px;
            box-shadow:0 0 15px rgba(0,255,255,0.15);
        }

        .score{
            font-size:40px;
            font-weight:bold;
            color:#22c55e;
        }

        .category{
            font-size:20px;
            margin:12px 0;
        }

        .recommendation{
            background:#172554;
            border-left:5px solid #3b82f6;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        h1{
            margin-bottom:30px;
        }

    </style>

</head>

<body>

<h1>🤖 AI Financial Advisor</h1>

<div class="advisor-card">

    <h3>Financial Health Score</h3>

    <div class="score">
        <span th:text="${financialScore}"></span>/100
    </div>

</div>
<div class="advisor-card">

    <h3>📊 Monthly Summary</h3>

    <p>
        Total Spending:
        ₹<span th:text="${totalSpending}"></span>
    </p>

    <p>
        Top Spending Category:
        <span th:text="${topCategory}"></span>
    </p>

</div>

<div class="advisor-card">

    <h3>Spending Analysis</h3>

    <div class="category">
        🍔 Food: ₹<span th:text="${foodTotal}"></span>
    </div>

    <div class="category">
        🏠 Rent: ₹<span th:text="${rentTotal}"></span>
    </div>

    <div class="category">
        🛒 Shopping: ₹<span th:text="${shoppingTotal}"></span>
    </div>

    <div class="category">
        🚕 Transport: ₹<span th:text="${transportTotal}"></span>
    </div>

</div>

<div class="recommendation">

    <h3>AI Recommendation</h3>

    <p th:text="${advice}"></p>

</div>

</body>
</html>
