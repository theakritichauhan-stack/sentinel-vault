<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>
        Sentinel Vault Login
    </title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">

    <link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body class="login-body">

<div class="login-overlay">

    <div class="login-box">

        <div class="bank-icon">

            <i class="fa-solid fa-shield-halved"></i>

        </div>

        <h1>
            Sentinel Vault
        </h1>

        <p class="subtitle">

            Intelligent Banking Security System

        </p>

        <form action="/login"
              method="post">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>

            </div>

            <button type="submit"
                    class="login-btn">

                Secure Login

            </button>

        </form>

        <a href="/register-page"
           class="register-link">

            Create New Account

        </a>

    </div>

</div>

</body>

</html>
