<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Vault Security</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-5">
    🔐 Sentinel Vault Security
</h1>

<form action="/lock-money"
      method="post"
      class="mb-5">

    <h3>
        Standard Vault Lock
    </h3>

    <input type="number"
           name="amount"
           placeholder="Amount"
           class="form-control mb-3"
           required>

    <button type="submit"
            class="btn btn-dark btn-lg">

        Lock Money

    </button>

</form>

<form action="/lock-money-hours"
      method="post"
      class="mb-5">

    <h3>
        Time Lock Vault
    </h3>

    <input type="number"
           name="amount"
           placeholder="Amount"
           class="form-control mb-3"
           required>

    <input type="number"
           name="hours"
           placeholder="Lock Duration (Hours)"
           class="form-control mb-3"
           required>

    <button type="submit"
            class="btn btn-danger btn-lg">

        Activate Time Lock

    </button>

</form>

<form action="/emergency-unlock"
      method="post">

    <h3>
        Emergency Override
    </h3>

    <button type="submit"
            class="btn btn-warning btn-lg">

        Emergency Unlock Vault

    </button>

</form>

<div th:if="${session.loggedInUser.emergencyUnlocked}"
     class="alert alert-warning mt-5">

    <h4>
        ⚠ Emergency Access Used
    </h4>

    <p>
        Vault protection was bypassed.
    </p>

</div>

</body>
</html>
