<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>
        Transactions
    </title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body class="dashboard-body">

<div class="sidebar">

    <h2>
        Sentinel Vault
    </h2>

    <ul class="menu">

        <li>
            <a href="/dashboard">

                <i class="fa-solid fa-chart-line"></i>

                Dashboard

            </a>
        </li>

        <li>
            <a href="/transactions">

                <i class="fa-solid fa-money-bill-transfer"></i>

                Transactions

            </a>
        </li>

        <li>
            <a href="/vault-security">

                <i class="fa-solid fa-vault"></i>

                Vault Security

            </a>
        </li>

    </ul>

</div>

<div class="main-content">

    <h1 class="mb-4">

        Transactions

    </h1>

    <div class="mb-4">

        <form action="/deposit"
              method="post"
              class="mb-3">

            <input type="number"
                   step="0.01"
                   name="amount"
                   placeholder="Deposit Amount"
                   class="form-control mb-2"
                   required>

            <button type="submit"
                    class="btn btn-success glow-btn">

                Deposit Money

            </button>

        </form>

        <form action="/withdraw"
              method="post">

            <input type="number"
                   step="0.01"
                   name="amount"
                   placeholder="Withdraw Amount"
                   class="form-control mb-2"
                   required>

            <button type="submit"
                    class="btn btn-danger glow-btn">

                Withdraw Money

            </button>

        </form>

    </div>

    <a href="/download-statement"
       class="btn btn-warning mb-4">

        Download PDF Statement

    </a>

    <table class="table table-dark table-striped table-hover">

        <thead>

        <tr>

            <th>
                Type
            </th>

            <th>
                Amount
            </th>

            <th>
                Risk Level
            </th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="transaction : ${transactions}">

            <td th:text="${transaction.type}"></td>

            <td th:text="'₹ ' + ${transaction.amount}"></td>

            <td th:text="${transaction.riskLevel}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
